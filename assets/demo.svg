<svg xmlns="http://www.w3.org/2000/svg" width="720" height="556">
  <style>
    .bg { fill: #1e1e2e; }
    .bar { fill: #313244; }
    .dot-r { fill: #f38ba8; }
    .dot-y { fill: #f9e2af; }
    .dot-g { fill: #a6e3a1; }
    .title { fill: #cdd6f4; font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace; font-size: 13px; }
    .t { fill: #cdd6f4; font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace; font-size: 13.5px; }
    .dim { fill: #6c7086; }
    .cyan { fill: #89dceb; }
    .green { fill: #a6e3a1; }
    .red { fill: #f38ba8; }
    .yellow { fill: #f9e2af; }
