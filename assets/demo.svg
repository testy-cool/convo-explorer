  <text class="t" x="30" y="304">agentconvos --search "rate limit" --json | jq '.hits[0]'</text>

  <text class="t" x="16" y="334">{</text>
  <text class="t purple" x="30" y="356">"uuid"</text>
  <text class="t dim" x="80" y="356">:</text>
  <text class="t green" x="94" y="356">"019e783a-e2bb-7ec2-9d2c-def97ab8c99d"</text>
  <text class="t dim" x="462" y="356">,</text>
